<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senha</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <h1>Gerador de Senha</h1>

        <p class="descricao">
            Escolha as opções abaixo e gere uma senha personalizada.
        </p>

        <div class="campo">
            <label for="quantidade">Quantidade de caracteres:</label>
            <input type="number" id="quantidade" min="4" max="30" value="10">
        </div>

        <div class="opcoes">
            <label>
                <input type="checkbox" id="maiusculas" checked>
                Letras maiúsculas
            </label>

            <label>
                <input type="checkbox" id="minusculas" checked>
                Letras minúsculas
            </label>

            <label>
                <input type="checkbox" id="numeros" checked>
                Números
            </label>

            <label>
                <input type="checkbox" id="simbolos" checked>
                Símbolos
            </label>
        </div>

        <div class="caixa-senha">
            <input type="text" id="senha" readonly placeholder="Sua senha aparecerá aqui">
        </div>

        <button onclick="gerarSenha()">
            Gerar senha
        </button>

        <p id="mensagem" class="mensagem"></p>
    </main>

    <script src="script.js"></script>
</body>
</html>
